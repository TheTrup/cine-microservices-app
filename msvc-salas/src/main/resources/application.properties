server.port=8002
spring.application.name=msvc-salas

# Nueva base de datos: cine_salas_db
spring.datasource.url=jdbc:mysql://localhost:3306/cine_salas_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
# IMPORTANTE: Déjalo vacío o pon tu contraseña según lo que arreglamos en el servicio anterior
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# URL del servidor Eureka para registrarse
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.prefer-ip-address=true

resilience4j.circuitbreaker.instances.peliculasCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.peliculasCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.peliculasCB.waitDurationInOpenState=10000