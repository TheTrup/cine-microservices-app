server:
  port: 8083 # Puerto exclusivo para Funciones (Peliculas usa 8081, Salas usa 8082)

spring:
  application:
    name: MSVC-FUNCIONES
  datasource:
    url: jdbc:mysql://localhost:3306/cine_funciones_db?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root     # Ajusta si tu MySQL usa otro usuario
    password:          # Coloca tu contraseña de MySQL si corresponde
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
